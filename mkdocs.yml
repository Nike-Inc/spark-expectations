          - Init: api/notifications_init.md
          - Base Notification Plugin: api/base_notification_plugin.md
          - Email Plugin: api/email_plugin.md
          - Slack Plugin: api/slack_plugin.md
          - Teams Plugin: api/teams_plugin.md
          - PagerDuty Plugin: api/pagerduty_plugin.md
          - Zoom Plugin: api/zoom_plugin.md
          - Push:
              - Notification Decorator: api/notifications_decorater.md
      - Utils:
          - Actions: api/actions.md
          - Reader: api/reader.md
          - Regulate Flow: api/regulate_flow.md
          - UDF: api/udf.md
      - Examples:
          - Base Setup: api/base_setup.md
          - Sample DQ BigQuery: api/sample_dq_bigquery.md
          - Sample DQ Delta: api/sample_dq_delta.md
          - Sample DQ Iceberg: api/sample_dq_iceberg.md

plugins:
  - search:
      lang: en
  - mkdocstrings:
      handlers:
        python:
          paths: [ "." ]
          options:
            show_source: true
            show_root_heading: false
            heading_level: 1
            merge_init_into_class: true
            show_if_no_docstring: true
            show_root_full_path: true
            show_root_members_full_path: true
            show_root_toc_entry: false
            show_category_heading: true
            show_signature_annotations: true
            separate_signature: false

markdown_extensions:
  - abbr
  - admonition
  - mkdocs-click
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde


watch:
  - spark_expectations

extra_css:
  - css/custom.css

extra:
  generator: false
  version:
    provider: mike
    default: latest