  - Home:
      - Overview: index.md
      - Why Spark-Expectations: home/why_spark_expectations.md
  - Getting Started:
      - Installation & Prerequisites: user_guide/getting_started.md
      - Quickstart: user_guide/quickstart.md
  - User Guide:
      - Data Quality Rules:
          - Row, Aggregate & Query DQ: user_guide/data_quality_rules.md
          - File-Based Rules (YAML & JSON): user_guide/file_based_rules.md
          - Rule Validation: user_guide/rule_validation.md
          - Rule Examples: configurations/rules.md
      - Configuration Reference: user_guide/configuration_reference.md
      - Writers:
          - Batch & Stream Writers: user_guide/writers.md
          - Streaming Guide: user_guide/Stream_write_guide.md
      - Output Tables:
          - Data Quality Metrics: user_guide/data_quality_metrics.md
          - Error Table: user_guide/error_table.md
      - Notifications:
          - Email:
              - Email Notification Config: user_guide/notifications/email_notifications.md
              - Email Notification Types: user_guide/notifications/email_notification_types.md
          - Slack: user_guide/notifications/slack_notifications.md
          - Teams: user_guide/notifications/teams_notifications.md
          - Zoom: user_guide/notifications/zoom_notifications.md
          - PagerDuty: user_guide/notifications/pagerduty_notifications.md
      - Observability & Reports: Observability_examples.md
      - Secrets Backend: user_guide/secrets_backend.md
      - Integrations:
          - Delta Lake: delta.md
          - BigQuery: bigquery.md
          - Iceberg: iceberg.md
      - Kafka Streaming Config: user_guide/user_config/kafka_custom_config.md
      - Serverless (Databricks): user_guide/serverless.md
      - FAQ & Troubleshooting: user_guide/faq.md
  - Examples:
      - Notebooks & Scripts: examples_notebooks.md
