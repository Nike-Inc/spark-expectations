site_name: Spark-Expectations
site_author: Ashok Singamaneni
copyright: Nike
site_description: Spark-Expectations is a framework for running data quality rules inflight of spark job.
site_url: https://engineering.nike.com/spark-expectations
repo_name: nike/spark-expectations
repo_url: https://github.com/Nike-Inc/spark-expectations

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.annotate
    - content.tooltips
    - content.code.copy
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono
  language: en


